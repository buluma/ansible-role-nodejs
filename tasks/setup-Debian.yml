---
- name: setup-Debian | Ensure dependencies are present.
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gnupg2
    state: present

- name: setup-Debian | Create apt keyrings directory.
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: setup-Debian | Download Nodesource GPG key.
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.asc
    mode: "0644"

- name: setup-Debian | Dearmor Nodesource GPG key.
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource.asc
    creates: /etc/apt/keyrings/nodesource.gpg
  changed_when: false

- name: setup-Debian | Add NodeSource repository.
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main"
    state: present
    filename: nodesource
  register: node_repo

- name: setup-Debian | Update apt cache if repo was added.
  ansible.builtin.apt:
    update_cache: true
  when: node_repo is changed
  tags: ["skip_ansible_lint"]

- name: setup-Debian | Pin apt to prefer NodeSource's nodejs over the distro package.
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/nodesource
    content: |
      Package: *
      Pin: origin deb.nodesource.com
      Pin-Priority: 600
    mode: "0644"

- name: setup-Debian | Ensure Node.js and npm are installed.
  ansible.builtin.apt:
    name: nodejs
    state: present
