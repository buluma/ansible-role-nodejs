---
- name: setup-Debian | Ensure dependencies are present.
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gnupg2
    state: present

- name: setup-Debian | Add Nodesource apt key.
  ansible.builtin.get_url:
    url: https://keyserver.ubuntu.com/pks/lookup?op=get&fingerprint=on&search=0x1655A0AB68576280
    dest: /etc/apt/trusted.gpg.d/nodejs.asc
    mode: "0644"

- name: setup-Debian | Add NodeSource repositories for Node.js.
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: present
  loop:
    - "deb https://deb.nodesource.com/node_{{ nodejs_version }} {{ ansible_facts['distribution_release'] }} main"
    - "deb-src https://deb.nodesource.com/node_{{ nodejs_version }} {{ ansible_facts['distribution_release'] }} main"
  register: node_repo

- name: setup-Debian | Update apt cache if repo was added.
  ansible.builtin.apt: update_cache=true
  when: node_repo is changed
  tags: ["skip_ansible_lint"]

- name: setup-Debian | Ensure Node.js and npm are installed.
  ansible.builtin.apt:
    name: "nodejs={{ nodejs_version | regex_replace('x', '') }}*"
    state: present
