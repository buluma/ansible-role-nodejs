---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
# Fedora is excluded entirely: NodeSource only publishes "el"-numbered RPM
# repos (RHEL/CentOS/Rocky/AlmaLinux/Amazon), nothing for Fedora, so this
# role's RedHat setup path (which os_family routes Fedora into) has never
# actually worked there.
platforms:
  - name: EL
    versions:
      - "10"
      - "9"
  - name: Debian
    versions:
      - all
  - name: Ubuntu
    versions:
      - all
